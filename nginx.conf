server {
    listen 80;
    # Atualizado para o novo domínio .com
    server_name goldstoremultimarcas.com www.goldstoremultimarcas.com;
    client_max_body_size 20M;

    root /var/www/goldstore-frontend; 
    index index.html;

    # GZIP (Mantido para performance interna)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # Segurança (O Gateway já envia esses headers, mas manter aqui reforça)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA React Router - ESSENCIAL
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
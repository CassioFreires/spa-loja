server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Root padrão do container
    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------
    # GZIP (Performance)
    # ----------------------------
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # ----------------------------
    # Segurança básica
    # ----------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ----------------------------
    # SPA React Router (Trata a rota /spa-loja/)
    # ----------------------------
    location /spa-loja/ {
        alias /usr/share/nginx/html/;
        index index.html;
        # Tenta o arquivo real, depois a pasta, e se não achar nada, volta para o index.html (SPA)
        try_files $uri $uri/ /spa-loja/index.html;
        add_header Cache-Control "no-cache";
    }

    # ----------------------------
    # Assets e Imagens (O segredo para não dar 404)
    # ----------------------------
    # Essa regra captura pedidos de assets e imagens dentro de /spa-loja/
    location ~* ^/spa-loja/(assets|images|static)/(.+)$ {
        alias /usr/share/nginx/html/$1/$2;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Fallback para arquivos estáticos na raiz (como favicon, robos.txt, ou banners soltos)
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri $uri/ =404;
    }

    # ----------------------------
    # Redireciona raiz / para /spa-loja/
    # ----------------------------
    location = / {
        return 301 /spa-loja/;
    }
}